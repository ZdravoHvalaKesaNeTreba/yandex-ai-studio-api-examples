<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Голосовой ассистент</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="status-badge" id="statusBadge">
                <span class="status-text">Инициализация...</span>
            </div>
        </header>

        <!-- Основная область -->
        <main class="main">
            <!-- Анимированные точки -->
            <div class="dots-container" id="dotsContainer">
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
                <div class="dot dot-4"></div>
            </div>

            <!-- Текстовая область для отображения диалога -->
            <div class="transcript-area" id="transcriptArea">
                <div class="transcript-placeholder">
                    Нажмите на кнопку микрофона<br>и начните говорить
                </div>
            </div>
        </main>

        <!-- Подвал с кнопками -->
        <footer class="footer">
            <div class="controls">
                <!-- Кнопка настройки -->
                <button class="btn-settings" id="settingsButton" aria-label="Настройки" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>
                    </svg>
                </button>
                
                <!-- Кнопка микрофона -->
                <button class="btn-mic" id="micButton" aria-label="Микрофон">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14Z" fill="currentColor"/>
                        <path d="M17 11C17 14.31 14.31 17 11 17C7.69 17 5 14.31 5 11H3C3 14.87 6.13 18 10 18V22H14V18C17.87 18 21 14.87 21 11H17Z" fill="currentColor"/>
                    </svg>
                </button>

                <!-- Кнопка стоп -->
                <button class="btn-stop" id="stopButton" aria-label="Остановить" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6H18V18H6V6Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Модальное окно настройки -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Настройка подключения</h2>
                <p class="modal-subtitle">Введите креденшалы Yandex Cloud</p>
            </div>
            
            <form id="settingsForm" class="settings-form">
                <div class="form-group">
                    <label for="folderId">Folder ID</label>
                    <input 
                        type="text" 
                        id="folderId" 
                        name="folderId" 
                        placeholder="b1gxxxxxxxxxxxxxxxxxx"
                        required
                    />
                    <span class="form-hint">ID каталога из консоли Yandex Cloud</span>
                </div>
                
                <div class="form-group">
                    <label for="apiKey">API Key</label>
                    <input 
                        type="password" 
                        id="apiKey" 
                        name="apiKey" 
                        placeholder="AQVNxxxxxxxxxxxxxxxxxxxxxx"
                        required
                    />
                    <span class="form-hint">API ключ для аутентификации</span>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="saveButton">
                        <span class="btn-text">Проверить и сохранить</span>
                        <span class="btn-loader" style="display: none;"></span>
                    </button>
                </div>
                
                <div class="form-status" id="formStatus" style="display: none;"></div>
            </form>
            
            <div class="modal-footer">
                <p>Получите креденшалы в 
                    <a href="https://console.yandex.cloud/" target="_blank" rel="noopener">
                        консоли Yandex Cloud
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
